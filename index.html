<head>
    <link rel="stylesheet" href="css/styleMain.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
        <div class="logo-main"><img class="logo-main-img" src="img/Logo.png" alt=""></div>
        <div class="header-menu">
            <div class="header-section-menu">
                <img id="favorite-cart" class="header-section-img" src="img/likes-star.png" alt="">
            </div>
            <div class="header-section-menu"> 
                <img id="shopping-cart" class="header-section-img" src="img/corzina.png" alt="">
            </div>
            <div class="header-section-menu-acc"><img id="header-acc-img" class="header-section-img" src="img/account.png" alt=""></div>
        </div>
    </header>
   <section class="carousel-section">
    <div id="carousel-conteiner">
        <div class="carousel-content">
                <div id="arrowLeft"><img src="img/arrowLeft.png" alt=""></div>
                <div id="arrowRight"><img src="img/arrowRight.png" alt=""></div>
            <ul id="navigation-bars">
            </ul>
            <div id="carousel-img">
            </div>
            <img src="img/CaruselContent-bg.png" alt="">
        </div>
    </div>
   </section>
    <section class="fillter-section">
        <button class="btn-fast-filt">Все товары</button>
        <div class="fast-filter">
            <div class="target-filt"></div>
            <button id="filterLowestPrice" class="fast-filter-button">Цена по убыванию</button>
            <button id="filterHigehstPrice" class="fast-filter-button">Цена по возрастанию</button>
            <button id="filterLowestRate" class="fast-filter-button">Высокий рейтинг</button>
        </div>
    </section>
    
    <img  id="main-bg" class=""  src="img/bg-main.jpg" alt="">
    <ul id="product-view"></ul>

    <section class="modal-windows">
        <div id="modal-window-bg">
            <div id="modal-window-min"></div>
            <div id="modal-window-max"></div>
        </div>
        
    </section>
    <script src="js/Maincarousel.js"></script>
    <script src="./js/scriptsMain.js" type="module"></script>
    <script src="./js/modalWindows.js" type="module"></script>
</body>
</html>
